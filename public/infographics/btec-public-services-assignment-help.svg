  <!-- Distinction standard -->
  <rect x="28" y="360" width="744" height="22" rx="4" fill="#7C3AED"/>
  <text x="400" y="375" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">DISTINCTION EVIDENCE — WHAT SETS APART PUBLIC SERVICES ASSIGNMENTS</text>

  <rect x="28" y="390" width="356" height="112" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="44" y="412" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#DC2626">Pass level — describes facts:</text>
  <text x="44" y="430" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">"The police have powers under PACE 1984</text>
  <text x="44" y="445" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">to stop and search individuals in certain</text>
  <text x="44" y="460" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">circumstances."</text>
  <text x="44" y="483" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#6B7280">States legislation without analysis or implication</text>

  <rect x="416" y="390" width="356" height="112" rx="6" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <text x="432" y="412" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#7C3AED">Distinction level — evaluates impact:</text>
  <text x="432" y="430" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">"PACE 1984 s.1 powers must be balanced</text>
  <text x="432" y="445" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">against HRA 1998 Art. 5 (right to liberty);</text>
  <text x="432" y="460" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">disproportionate use undermines community</text>
  <text x="432" y="475" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">trust, as evidenced by Macpherson (1999)..."</text>
  <text x="432" y="493" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#6B7280">Evaluates legislation + impact + evidence + judgement</text>
</svg>
