  <text x="296" y="263" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">British citizenship, rights, responsibilities</text>
  <text x="296" y="278" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Equality Act 2010, protected characteristics</text>
  <text x="296" y="293" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Diversity in uniformed services</text>
  <text x="296" y="308" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Community cohesion strategies</text>
  <text x="296" y="332" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#DC2626">Internal · P/M/D</text>

  <rect x="540" y="224" width="232" height="120" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="540" y="224" width="232" height="24" rx="6" fill="#059669"/>
  <rect x="540" y="238" width="232" height="10" fill="#059669"/>
  <text x="656" y="239" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">Discipline and Physical Fitness</text>
  <text x="552" y="263" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Command and control structures</text>
  <text x="552" y="278" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Fitness standards for services (PFT)</text>
  <text x="552" y="293" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Leadership styles in public services</text>
