<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="100%" role="img" aria-labelledby="distinction-title">
  <title id="distinction-title">How to Achieve Distinction in BTEC Assignments: Evaluation Depth, Academic Sourcing, Structural Approach, and Common Failure Modes</title>

  <rect width="800" height="560" fill="#F4F7FB" rx="14"/>
  <rect width="800" height="64" fill="#7C3AED" rx="14"/>
  <rect y="50" width="800" height="14" fill="#7C3AED"/>
  <text x="400" y="28" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">How to Achieve Distinction in BTEC Assignments</text>
  <text x="400" y="52" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#DDD6FE">Evaluation Depth · Academic Evidence · Structural Strategy · Common Failure Modes to Avoid</text>

  <!-- 5 pillars -->
  <rect x="28" y="78" width="744" height="22" rx="4" fill="#1B3A6B"/>
  <text x="400" y="93" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">FIVE PILLARS OF DISTINCTION-LEVEL BTEC PERFORMANCE</text>

  <rect x="28" y="108" width="138" height="150" rx="8" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <rect x="28" y="108" width="138" height="32" rx="8" fill="#7C3AED"/>
  <rect x="28" y="128" width="138" height="12" fill="#7C3AED"/>
  <text x="97" y="122" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9.5" font-weight="700" fill="#FFFFFF">1. Evaluation</text>
  <text x="38" y="155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Weigh strengths</text>
  <text x="38" y="169" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">against limitations</text>
  <text x="38" y="183" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">in every section</text>
  <text x="38" y="199" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Reach a justified</text>
  <text x="38" y="213" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">conclusion</text>
  <text x="38" y="246" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#7C3AED">No fence-sitting</text>

  <rect x="182" y="108" width="138" height="150" rx="8" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <rect x="182" y="108" width="138" height="32" rx="8" fill="#7C3AED"/>
  <rect x="182" y="128" width="138" height="12" fill="#7C3AED"/>
  <text x="251" y="122" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9.5" font-weight="700" fill="#FFFFFF">2. Criterion Cover</text>
  <text x="192" y="155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Every P, M, D</text>
  <text x="192" y="169" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">criterion explicitly</text>
  <text x="192" y="183" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">met — missed P</text>
  <text x="192" y="197" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">= Referral even</text>
  <text x="192" y="211" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">with D quality</text>
  <text x="192" y="246" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#7C3AED">Map to brief</text>

  <rect x="336" y="108" width="138" height="150" rx="8" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <rect x="336" y="108" width="138" height="32" rx="8" fill="#7C3AED"/>
  <rect x="336" y="128" width="138" height="12" fill="#7C3AED"/>
  <text x="405" y="122" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9.5" font-weight="700" fill="#FFFFFF">3. Academic Evidence</text>
  <text x="346" y="155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Source claims with</text>
  <text x="346" y="169" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">academic journals</text>
  <text x="346" y="183" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">and textbooks</text>
  <text x="346" y="197" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Harvard referencing</text>
  <text x="346" y="211" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">mandatory at HNC/D</text>
  <text x="346" y="246" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#7C3AED">No unsourced claims</text>

  <rect x="490" y="108" width="138" height="150" rx="8" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <rect x="490" y="108" width="138" height="32" rx="8" fill="#7C3AED"/>
  <rect x="490" y="128" width="138" height="12" fill="#7C3AED"/>
  <text x="559" y="122" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9.5" font-weight="700" fill="#FFFFFF">4. Synthesis</text>
  <text x="500" y="155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Bring multiple</text>
  <text x="500" y="169" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">sources and</text>
  <text x="500" y="183" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">perspectives into</text>
  <text x="500" y="197" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">dialogue — not</text>
  <text x="500" y="211" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">source summaries</text>
  <text x="500" y="246" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#7C3AED">Themes, not sources</text>

  <rect x="644" y="108" width="128" height="150" rx="8" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <rect x="644" y="108" width="128" height="32" rx="8" fill="#7C3AED"/>
  <rect x="644" y="128" width="128" height="12" fill="#7C3AED"/>
  <text x="708" y="122" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9.5" font-weight="700" fill="#FFFFFF">5. Recommendations</text>
  <text x="654" y="155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Specific, evidenced,</text>
  <text x="654" y="169" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">justified — not</text>
  <text x="654" y="183" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">generic advice</text>
  <text x="654" y="197" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Derive from own</text>
  <text x="654" y="211" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">analysis only</text>
  <text x="654" y="246" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#7C3AED">No new information</text>

  <!-- Distinction writing comparison -->
  <rect x="28" y="272" width="744" height="22" rx="4" fill="#1B3A6B"/>
  <text x="400" y="287" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">DISTINCTION vs PASS — SAME TOPIC, DIFFERENT COGNITIVE DEPTH</text>

  <rect x="28" y="302" width="356" height="130" rx="8" fill="#FFFFFF" stroke="#FECACA" stroke-width="1.5"/>
  <rect x="28" y="302" width="356" height="26" rx="8" fill="#DC2626"/>
  <rect x="28" y="318" width="356" height="10" fill="#DC2626"/>
  <text x="206" y="319" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Pass-Level Response (describe/explain)</text>
  <text x="44" y="345" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">"Maslow's Hierarchy of Needs has five levels:</text>
  <text x="44" y="360" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">physiological, safety, love and belonging,</text>
  <text x="44" y="375" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">esteem, and self-actualisation. Maslow argued</text>
  <text x="44" y="390" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">that lower needs must be met before higher</text>
  <text x="44" y="405" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">ones can be addressed."</text>
  <text x="44" y="423" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#6B7280">Accurate description — meets Pass. No analysis.</text>

  <rect x="416" y="302" width="356" height="130" rx="8" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <rect x="416" y="302" width="356" height="26" rx="8" fill="#7C3AED"/>
  <rect x="416" y="318" width="356" height="10" fill="#7C3AED"/>
  <text x="594" y="319" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Distinction-Level Response (evaluate)</text>
  <text x="432" y="345" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">"While Maslow's hierarchy provides a useful</text>
  <text x="432" y="360" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">framework, its fixed sequential structure is</text>
  <text x="432" y="375" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">contested: Wahba and Bridwell (1976) found</text>
  <text x="432" y="390" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">limited empirical support. Alderfer's ERG model</text>
  <text x="432" y="405" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">offers a more flexible alternative; however, for</text>
  <text x="432" y="418" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">this workforce context, Maslow remains most...</text>
  <text x="432" y="423" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#6B7280">Evaluates, critiques, synthesises, reaches judgement</text>

  <!-- Common failures -->
  <rect x="28" y="448" width="744" height="22" rx="4" fill="#DC2626"/>
  <text x="400" y="463" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">TOP 4 REASONS STUDENTS MISS DISTINCTION — AND HOW TO FIX THEM</text>

  <rect x="28" y="478" width="176" height="68" rx="6" fill="#FFFFFF" stroke="#FECACA" stroke-width="1"/>
  <text x="38" y="496" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#DC2626">Verb mismatch</text>
  <text x="38" y="511" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">Describing when asked</text>
  <text x="38" y="524" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">to evaluate. Read verb</text>
  <text x="38" y="537" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">carefully in each criterion</text>

  <rect x="220" y="478" width="176" height="68" rx="6" fill="#FFFFFF" stroke="#FECACA" stroke-width="1"/>
  <text x="230" y="496" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#DC2626">Missing a Pass criterion</text>
  <text x="230" y="511" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">Even one unmet P triggers</text>
  <text x="230" y="524" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">referral. Check every P</text>
  <text x="230" y="537" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">criterion before submitting</text>

  <rect x="412" y="478" width="176" height="68" rx="6" fill="#FFFFFF" stroke="#FECACA" stroke-width="1"/>
  <text x="422" y="496" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#DC2626">No Harvard referencing</text>
  <text x="422" y="511" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">At HNC/HND all claims</text>
  <text x="422" y="524" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">need in-text citation</text>
  <text x="422" y="537" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">+ reference list entry</text>

  <rect x="604" y="478" width="168" height="68" rx="6" fill="#FFFFFF" stroke="#FECACA" stroke-width="1"/>
  <text x="614" y="496" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#DC2626">Generic conclusions</text>
  <text x="614" y="511" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">"Businesses should improve</text>
  <text x="614" y="524" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">communication" fails D.</text>
  <text x="614" y="537" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">Be specific + evidenced</text>
</svg>
