<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background: navy rounded square -->
  <rect width="32" height="32" rx="7" fill="#1B2B4B"/>

  <!-- Graduation cap: board -->
  <polygon points="16,6 28,11.5 16,17 4,11.5" fill="#FFFFFF"/>

  <!-- Graduation cap: top flat highlight -->
  <polygon points="16,6 28,11.5 16,17 4,11.5" fill="#2ECC71" opacity="0.18"/>

  <!-- Left edge of cap for depth -->
  <polygon points="16,6 28,11.5 16,17 4,11.5" fill="none" stroke="#2ECC71" stroke-width="0.6" stroke-linejoin="round"/>

  <!-- Cap stem (the standing part) -->
  <rect x="15.1" y="17" width="1.8" height="5.5" rx="0.5" fill="#FFFFFF"/>

  <!-- Tassel drop base -->
  <circle cx="25" cy="12.8" r="1" fill="#2ECC71"/>
  <!-- Tassel line -->
  <line x1="25" y1="13.8" x2="25" y2="18.5" stroke="#2ECC71" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Tassel end -->
  <circle cx="25" cy="19.2" r="1.3" fill="#2ECC71"/>

  <!-- Green accent bar at bottom -->
  <rect x="4" y="27" width="24" height="3" rx="1.5" fill="#2ECC71"/>
</svg>
